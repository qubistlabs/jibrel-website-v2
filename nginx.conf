daemon off;
user nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

env AUTOPILOT_API_KEY;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    server_tokens off;

    gzip on;
    gzip_comp_level 6;
    gzip_disable "msie6";
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types *;

    server {
        listen 80 default_server;

        location / {
            root /app;
            index index.html;
            try_files $uri $uri.html $uri/ /index.html;
        }

        location /status {
            stub_status;
        }

        location ~ /api {
            set $cors 0;
            if ($http_origin ~ '^https?://(localhost|jibrel\.network|v2\.jibrelnetwork\.develop\.stack\.jdev\.network)') {
                set $cors 1;
            }

            if ($cors = 0) {
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Type' always;

            # Pre-flight request handling
            if ($request_method = OPTIONS ) {
                # Pre-flight response is valid for 10 days
                add_header 'Access-Control-Max-Age' 864000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            location /api/subscribe {
                proxy_pass https://api2.autopilothq.com/v1/contact/;
                proxy_set_header autopilotapikey $AUTOPILOT_API_KEY;
            }
        }
    }
}
