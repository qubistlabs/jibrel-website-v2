<div class='text {{this.modClassText}}'>
  <h2 class='title {{this.modClassTitle}} {{#is img '!=' ''}}-neighbor-img{{/is}}'>{{{this.title}}}</h2>
  <div class='descr {{this.modClassDescr}}'>{{this.descr}}</div>
  {{#is buttonText '!=' ''}}
  <div class='btns'>
    <a href='{{buttonLink}}' class='j-button {{buttonClass}}'><span class='text'>{{buttonText}}</span></a>
  </div>
  {{/is}}
</div>
{{#is img '!=' ''}}
<div class='picture'>
  <img src='{{img}}' srcset='{{img2x}}' class='img {{modClassImg}}' alt='{{this.title}}'>
</div>
{{/is}}
