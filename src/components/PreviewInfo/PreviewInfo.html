<div class="text {{this.modClassText}}">
  <h2 class="title {{this.modClassTitle}}">{{{this.title}}}</h2>
  <div class="descr {{this.modClassDescr}}">{{this.descr}}</div>
  {{#is buttonText '!=' ''}}
  <div class="btns">
    <a href="#" class="j-button {{buttonClass}}"><span class="text">{{buttonText}}</span></a>
  </div>
  {{/is}}
</div>
{{#is img '!=' ''}}
<div class="picture">
  <img src="{{img}}" srcset="{{img2x}}" class="img" alt="">
</div>
{{/is}}
