
{{#each ListVacancies}}
<a href='vacancies/{{this.link}}' class='item'>
  <div class='header'>
    <div class='position'>{{this.position}}</div>
    <div class='job-info -in-vacancies-list'>
      <div class='time'>{{Icon iconName='i-clock' className='icon' iconWidth='' iconHeight=''}} Full-Time</div>
      <div class='place'>{{Icon iconName='i-pin' className='icon' iconWidth='' iconHeight=''}} {{this.place}}</div>
    </div>
  </div>
  <div class='body'>
    <div class='descr'>{{this.descr}}</div>
  </div>
</a>
{{/each}}
