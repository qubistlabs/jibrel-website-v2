{{#each TeamList}}
<div class='item'>
  <div class='avatar'>
    <img src='/assets/img/general/team/{{img}}' srcset='/assets/img/general/team/{{img2x}} 2x' alt='' class='img'>
  </div>
  <div class='name'>{{name}}</div>
  <div class='position'>{{position}}</div>
</div>
{{/each}}
<div class='item -action'>
  <div class='pic'>
    <div class='add'></div>
  </div>
  <div class='name -color-blue'>Join the team!</div>
  <div class='position -color-blue'>Apply Now</div>
</div>
