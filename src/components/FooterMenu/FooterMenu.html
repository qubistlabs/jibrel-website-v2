<div class='footer-menu'>
  {{#each FooterMenu}}
  <div class='box'>
    <div class='title'>{{this.title}}</div>
    {{#each this.links}}
    <div class='item {{modClass}}'>
      <a href='{{this.link}}' class='link'>
        {{#is text '!=' ''}}{{this.text}}{{/is}}
        {{#is socialIcon '!=' ''}}{{{this.socialIcon}}}{{/is}}
      </a>
    </div>
    {{/each}}
  </div>
  {{/each}}
</div>
