<div class='footer-menu'>
  {{#each FooterMenu}}
  <div class='box'>
    <div class='title'>{{this.title}}</div>
    {{#each this.links}}
    <div class='item {{modClass}}'>
      <a href='{{this.link}}' class='link'>
        {{this.text}}
      </a>
    </div>
    {{/each}}
  </div>
  {{/each}}
  <div class='box'>
    <div class='title'>Social</div>
    {{> CircleSocial/CircleSocial}}
  </div>
</div>
