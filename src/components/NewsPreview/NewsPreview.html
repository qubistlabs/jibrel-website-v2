<div class='news-preview'>
  {{#each NewsPreview}}
  <div class='item'>
    <a href='news-one.html' class='box'>
      <div class='pic'><img src='{{this.img}}' srcset='{{this.img2x}} 2x' alt='{{this.title}}' class='img'></div>
      <div class='body'>
        <time class='date'>{{this.date}}</time>
        <h2 class='title'>{{this.title}}</h2>
        <p class='descr'>{{this.descr}}</p>
      </div>
    </a>
  </div>
  {{/each}}
</div>
