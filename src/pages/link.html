<!doctype html>
<html class='no-js' lang='en'>

<head>
  {{> ProjectHead/ProjectHead ProjectHead.home}}
</head>

<body>
  %=symbols=%
  {{> MainHeader/MainHeader MainHeader.color}}
  {{> PopUp/MainMenu/MainMenu}}

  <section class='section-content -offset-top -offset-bottom'>
    <div class='container _container-fix'>
      <ul>
        {{#each __pages}}
        <li>
          <a href='{{this.href}}'>{{this.name}}</a>
        </li>
        {{/each}}
      </ul>
    </div>
  </section>

  {{> MainFooter/MainFooter}}
  {{> PopUp/PopUp}}
  {{> ProjectStatic/ProjectStatic}}
</body>
</html>
